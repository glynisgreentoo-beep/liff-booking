<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>預約系統</title>
  <script src="https://static.line-scdn.net/liff/edge/versions/2.22.3/sdk.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f4f8;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 40px 32px;
      max-width: 360px;
      width: 90%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .logo {
      font-size: 48px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 20px;
      color: #1a1a1a;
      margin-bottom: 8px;
      font-weight: 700;
    }
    p {
      font-size: 14px;
      color: #666;
      line-height: 1.6;
      margin-bottom: 24px;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #e0e0e0;
      border-top-color: #06C755;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .status {
      font-size: 13px;
      color: #888;
    }
    .error-card {
      display: none;
    }
    .btn {
      display: inline-block;
      background: #06C755;
      color: white;
      padding: 12px 28px;
      border-radius: 24px;
      text-decoration: none;
      font-size: 15px;
      font-weight: 600;
      margin-top: 16px;
      cursor: pointer;
      border: none;
      width: 100%;
    }
    .btn:hover { background: #05a847; }
  </style>
</head>
<body>
  <div class="card" id="loading-card">
    <div class="logo">💆</div>
    <h1>正在載入預約頁面</h1>
    <p>請稍候，系統正在準備您的專屬預約連結…</p>
    <div class="spinner"></div>
    <div class="status" id="status-text">初始化中…</div>
  </div>

  <div class="card error-card" id="error-card">
    <div class="logo">⚠️</div>
    <h1>載入失敗</h1>
    <p id="error-msg">請關閉此頁面後重試，或直接點選下方連結前往預約。</p>
    <a class="btn" id="fallback-link" href="#">直接前往預約頁面</a>
  </div>

  <script>
const LIFF_ID = "2010006924-yy3gmsF5";
    const CAL_URL = "https://cal.com/tomisacat-eur7wq";

    const statusEl = document.getElementById("status-text");
    const loadingCard = document.getElementById("loading-card");
    const errorCard = document.getElementById("error-card");
    const fallbackLink = document.getElementById("fallback-link");
    const errorMsg = document.getElementById("error-msg");

    fallbackLink.href = CAL_URL;

    function showError(msg) {
      loadingCard.style.display = "none";
      errorCard.style.display = "block";
      errorMsg.textContent = msg;
    }

    async function init() {
      try {
        statusEl.textContent = "連接 LINE 中…";
        await liff.init({ liffId: LIFF_ID });

        if (!liff.isLoggedIn()) {
          statusEl.textContent = "正在登入…";
          liff.login();
          return;
        }

        statusEl.textContent = "取得身份資訊…";
        const profile = await liff.getProfile();
        const userId = profile.userId;

        statusEl.textContent = "跳轉至預約頁面…";
        const redirectUrl = CAL_URL + "?lineUserId=" + encodeURIComponent(userId);
        window.location.href = redirectUrl;

      } catch (err) {
        showError("錯誤代碼：" + (err.code || "unknown") + " / " + (err.message || JSON.stringify(err)));
      }
    }

    init();
  </script>
</body>
</html>
