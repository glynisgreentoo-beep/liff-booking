<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>預約系統</title>
  <script src="https://static.line-scdn.net/liff/edge/versions/2.22.3/sdk.js"></script>
  <style>
    body { font-family: sans-serif; display: flex; justify-content: center;
           align-items: center; min-height: 100vh; background: #f0f4f8; margin: 0; }
    .card { background: white; padding: 40px; border-radius: 16px;
            text-align: center; max-width: 400px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
    .spinner { width: 40px; height: 40px; margin: 16px auto;
               border: 3px solid #eee; border-top-color: #06C755;
               border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card" id="content">
    <h2>正在載入預約頁面…</h2>
    <div class="spinner"></div>
  </div>
  <script>
    const LIFF_ID = "2010052302-MDjNIaeq";
    const CAL_URL = "https://cal.com/glyn-dryvr9";
 
    async function init() {
      try {
        await liff.init({ liffId: LIFF_ID });
 
        if (liff.isInClient()) {
          // ✅ LINE 內建瀏覽器：抓取 User ID 後跳轉
          if (!liff.isLoggedIn()) {
            liff.login();
            return;
          }
          const profile = await liff.getProfile();
          window.location.href = `${CAL_URL}?lineUserId=${encodeURIComponent(profile.userId)}`;
        } else {
          // ✅ 電腦或手機外部瀏覽器：直接跳轉，不帶 ID
          window.location.href = CAL_URL;
        }
      } catch (err) {
        // ⚠️ LIFF 初始化失敗也直接跳轉，不卡住使用者
        console.error("LIFF init error:", err);
        window.location.href = CAL_URL;
      }
    }
 
    init();
  </script>
</body>
</html>
